# Copy to `config.yaml` and fill secrets.

app:
  # streamlit | telegram | console
  interface: streamlit
  logging_enabled: true
  # true — показывать user_id и экран в Streamlit (только для отладки)
  debug_ui: false
  # На прод-VM: IP или DNS для вывода в консоли при streamlit run (см. .streamlit/config.toml [browser] serverAddress)
  # streamlit_public_host: "45.132.18.2"

logging:
  engine: postgres
  host: localhost
  port: 5432
  database: communication
  user: roman
  password: YOUR_PASSWORD_HERE
  schema: wvs

telegram:
  token: YOUR_TOKEN_HERE
  # Если с сервера api.telegram.org недоступен (таймаут на RU VPS) — HTTP/SOCKS прокси:
  # proxy_url: "http://127.0.0.1:1080"
  # proxy_url: "socks5://user:pass@host:1080"
  proxy_url: ""
  request_timeout_sec: 60

paths:
  questions_file: questions.json

analytics:
  # Справочники gen_sample / country_data — в той же схеме, что logging.schema (wvs)
  reference_schema: wvs
  gen_sample_csv: gen_sample.csv
  country_data_csv: country_data.csv
