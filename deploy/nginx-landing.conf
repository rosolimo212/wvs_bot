# Корневой домен: worldvaluessurveybot.info → статический лендинг
#
#   mkdir -p /var/www/worldvaluessurveybot
#   cp deploy/www/index.html /var/www/worldvaluessurveybot/
#   cp deploy/nginx-landing.conf /etc/nginx/sites-available/wvs-landing
#   ln -sf /etc/nginx/sites-available/wvs-landing /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name worldvaluessurveybot.info www.worldvaluessurveybot.info;

    root /var/www/worldvaluessurveybot;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}
